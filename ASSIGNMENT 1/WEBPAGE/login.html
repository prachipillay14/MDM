<!DOCTYPE html>
<html>
<head>
    <title>Online Voting System - Login</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #a8e063, #56ab2f);
            text-align: center;
        }
        .container {
            margin-top: 100px;
        }
        input, select {
            width: 250px;
            padding: 10px;
            margin: 10px;
        }
        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
        }
        a {
            text-decoration: none;
        }
    </style>
</head>

<body>
    <h2>Online Voting System</h2>

    <div class="container">
        <h3>Login</h3>

        <input type="text" placeholder="Enter mobile"><br>
        <input type="password" placeholder="Enter password"><br>

        <select>
            <option>Voter</option>
            <option>Admin</option>
        </select><br>

        <button>Login</button><br><br>

        <a href="cast.html">New user? Register here</a>
    </div>
</body>
</html>
